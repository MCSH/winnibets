<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stylized mosquito favicon for WinniBets -->
  <!-- Body -->
  <ellipse cx="32" cy="36" rx="6" ry="10" fill="#1493FF" />
  <!-- Head -->
  <circle cx="32" cy="23" r="5" fill="#4DB1FF" />
  <!-- Proboscis (needle) -->
  <line x1="32" y1="18" x2="32" y2="6" stroke="#4DB1FF" stroke-width="2" stroke-linecap="round" />
  <!-- Wings (left) -->
  <ellipse cx="22" cy="30" rx="9" ry="4" fill="#1493FF" fill-opacity="0.35" transform="rotate(-25 22 30)" />
  <!-- Wings (right) -->
  <ellipse cx="42" cy="30" rx="9" ry="4" fill="#1493FF" fill-opacity="0.35" transform="rotate(25 42 30)" />
  <!-- Legs (3 pairs) -->
  <line x1="28" y1="38" x2="18" y2="48" stroke="#4DB1FF" stroke-width="1.5" stroke-linecap="round" />
  <line x1="27" y1="34" x2="16" y2="40" stroke="#4DB1FF" stroke-width="1.5" stroke-linecap="round" />
  <line x1="28" y1="42" x2="20" y2="54" stroke="#4DB1FF" stroke-width="1.5" stroke-linecap="round" />
  <line x1="36" y1="38" x2="46" y2="48" stroke="#4DB1FF" stroke-width="1.5" stroke-linecap="round" />
  <line x1="37" y1="34" x2="48" y2="40" stroke="#4DB1FF" stroke-width="1.5" stroke-linecap="round" />
  <line x1="36" y1="42" x2="44" y2="54" stroke="#4DB1FF" stroke-width="1.5" stroke-linecap="round" />
  <!-- Antennae -->
  <line x1="30" y1="19" x2="25" y2="12" stroke="#4DB1FF" stroke-width="1.2" stroke-linecap="round" />
  <line x1="34" y1="19" x2="39" y2="12" stroke="#4DB1FF" stroke-width="1.2" stroke-linecap="round" />
  <!-- Eye highlights -->
  <circle cx="30.5" cy="22" r="1.2" fill="white" />
  <circle cx="33.5" cy="22" r="1.2" fill="white" />
</svg>
