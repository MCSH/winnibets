<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Minimal mosquito: body + wings + proboscis -->
  <!-- Proboscis -->
  <line x1="16" y1="4" x2="16" y2="11" stroke="#4DB1FF" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="16" cy="18" rx="4" ry="8" fill="#1493FF"/>
  <!-- Left wing -->
  <ellipse cx="9" cy="14" rx="6" ry="3" fill="#1493FF" opacity="0.4" transform="rotate(-15 9 14)"/>
  <!-- Right wing -->
  <ellipse cx="23" cy="14" rx="6" ry="3" fill="#1493FF" opacity="0.4" transform="rotate(15 23 14)"/>
  <!-- Head -->
  <circle cx="16" cy="12" r="3" fill="#4DB1FF"/>
</svg>
